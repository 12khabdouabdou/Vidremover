name: Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          # Install Android SDK
          sudo apt-get update
          sudo apt-get install -y wget unzip
          
          # Create SDK directory
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME
          
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME
          mv $ANDROID_HOME/cmdline-tools $ANDROID_HOME/cmdline-tools-temp
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools-temp/bin $ANDROID_HOME/cmdline-tools-temp/lib $ANDROID_HOME/cmdline-tools/latest/ || true
          rm -rf $ANDROID_HOME/cmdline-tools-temp
          
          # Export paths
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Accept licenses and install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: List build directory
        run: find app/build -name "*.apk" -o -name "*.json" | head -20

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vidremover-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn